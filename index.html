<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>お祭りマップ＆カレンダー（世田谷・杉並・目黒・大田・川崎）</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<style>
  :root{
    --bg:#f7f5f0; --panel:#ffffff; --ink:#2b2320; --muted:#8a7f77;
    --accent:#e0592a; --accent-soft:#fdeee6; --line:#eae4dc;
    --confirmed:#d84a1e; --annual:#c8942f; --shadow:0 2px 10px rgba(0,0,0,.08);
    --header-h:54px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic UI","Meiryo",sans-serif;
    color:var(--ink); background:var(--bg); overflow:hidden;
  }
  header{
    height:var(--header-h); display:flex; align-items:center; gap:8px;
    padding:0 14px; background:var(--accent); color:#fff; box-shadow:var(--shadow);
    position:relative; z-index:1200;
  }
  header .logo{font-size:20px;}
  header h1{font-size:16px; margin:0; font-weight:700; letter-spacing:.02em;}
  header .sub{font-size:11px; opacity:.85; margin-left:auto;}

  .app{
    display:flex; height:calc(100% - var(--header-h));
  }
  #map{flex:1 1 55%; min-width:0; height:100%; background:#dfe8e4;}
  .side{
    flex:0 0 380px; max-width:42%; height:100%; overflow-y:auto;
    background:var(--panel); border-left:1px solid var(--line);
    -webkit-overflow-scrolling:touch;
  }

  /* Calendar */
  .cal{padding:12px 12px 4px;}
  .cal-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;}
  .cal-head .mlabel{font-size:16px; font-weight:700;}
  .cal-nav{display:flex; gap:6px;}
  .cal-nav button, .today-btn{
    border:1px solid var(--line); background:#fff; color:var(--ink);
    border-radius:8px; padding:6px 10px; font-size:13px; cursor:pointer; line-height:1;
  }
  .cal-nav button:active,.today-btn:active{background:var(--accent-soft);}
  .grid{display:grid; grid-template-columns:repeat(7,1fr); gap:3px;}
  .dow{text-align:center; font-size:11px; color:var(--muted); padding:2px 0;}
  .dow.sun{color:#d5533f;} .dow.sat{color:#3f7ad5;}
  .cell{
    position:relative; aspect-ratio:1/1; border-radius:8px; border:1px solid transparent;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-size:13px; cursor:pointer; user-select:none; background:#faf8f5;
  }
  .cell.empty{background:transparent; cursor:default;}
  .cell.has:hover{border-color:var(--accent);}
  .cell.sun{color:#d5533f;} .cell.sat{color:#3f7ad5;}
  .cell.today{outline:2px solid var(--accent); outline-offset:-2px; font-weight:700;}
  .cell.selected{background:var(--accent); color:#fff !important;}
  .cell .dots{position:absolute; bottom:5px; display:flex; gap:2px;}
  .cell .dot{width:5px; height:5px; border-radius:50%;}
  .dot.confirmed{background:var(--confirmed);} .dot.annual{background:var(--annual);}
  .cell.selected .dot{background:#fff;}
  .cal-legend{display:flex; gap:14px; font-size:11px; color:var(--muted); padding:8px 2px 2px;}
  .cal-legend span{display:inline-flex; align-items:center; gap:5px;}
  .cal-legend i{width:8px; height:8px; border-radius:50%; display:inline-block;}

  /* List */
  .list{padding:6px 12px 24px;}
  .list-title{font-size:13px; font-weight:700; color:var(--muted); margin:10px 2px 8px; display:flex; align-items:center; gap:8px;}
  .list-title .clear{margin-left:auto; font-size:11px; color:var(--accent); cursor:pointer; font-weight:600;}
  .card{
    border:1px solid var(--line); border-radius:12px; padding:11px 12px; margin-bottom:9px;
    cursor:pointer; transition:box-shadow .15s, border-color .15s; background:#fff;
  }
  .card:hover{box-shadow:var(--shadow); border-color:var(--accent);}
  .card.active{border-color:var(--accent); box-shadow:var(--shadow);}
  .card .row1{display:flex; align-items:baseline; gap:8px;}
  .card .cname{font-size:15px; font-weight:700;}
  .card .badge{font-size:10px; padding:2px 7px; border-radius:99px; color:#fff; white-space:nowrap;}
  .badge.confirmed{background:var(--confirmed);} .badge.annual{background:var(--annual);}
  .area-tag{font-size:10px; padding:2px 7px; border-radius:99px; white-space:nowrap; background:#efe9e1; color:#6b625b;}
  .card .when{font-size:12.5px; color:var(--accent); font-weight:600; margin-top:4px;}
  .card .place{font-size:12px; color:var(--muted); margin-top:2px;}
  .card .desc{font-size:12px; color:#5f564f; margin-top:6px; line-height:1.5; display:none;}
  .card.active .desc{display:block;}
  .card .more{font-size:12px; margin-top:7px; display:none;}
  .card.active .more{display:block;}
  .card .more a{color:var(--accent);}
  .empty-msg{font-size:13px; color:var(--muted); padding:16px 4px; text-align:center;}
  .past-toggle{
    width:100%; border:1px dashed var(--line); background:#faf8f5; color:#8a7f77;
    border-radius:10px; padding:9px 12px; font-size:12.5px; font-weight:600; cursor:pointer;
    margin:2px 0 9px; text-align:left;
  }
  .past-toggle:hover{border-color:var(--accent); color:var(--accent);}
  .card.past{opacity:.62;}
  .card.past .when{color:var(--muted);}

  /* Filters */
  .filters{padding:10px 12px 4px; border-bottom:1px solid var(--line);}
  .search-wrap{position:relative;}
  .search{
    width:100%; border:1px solid var(--line); border-radius:10px; padding:9px 30px 9px 12px;
    font-size:14px; color:var(--ink); background:#faf8f5; outline:none;
  }
  .search:focus{border-color:var(--accent); background:#fff;}
  .search-clear{
    position:absolute; right:6px; top:50%; transform:translateY(-50%);
    border:none; background:#e7ded4; color:#6b625b; border-radius:50%;
    width:20px; height:20px; font-size:11px; line-height:1; cursor:pointer;
  }
  .chip-group{margin-top:9px;}
  .chip-label{font-size:10px; color:var(--muted); font-weight:700; display:block; margin-bottom:5px; letter-spacing:.04em;}
  .chips{display:flex; flex-wrap:wrap; gap:6px;}
  .chip{
    border:1px solid var(--line); background:#fff; color:#6b625b;
    border-radius:99px; padding:5px 11px; font-size:12px; cursor:pointer; user-select:none;
    display:inline-flex; align-items:center; gap:5px; white-space:nowrap;
  }
  .chip:active{transform:scale(.96);}
  .chip.on{background:var(--accent); border-color:var(--accent); color:#fff;}

  /* Bottom-sheet handle (mobile only) */
  .sheet-handle{display:none;}

  @media (max-width:760px){
    :root{--header-h:48px;}
    header h1{font-size:14px;} header .sub{display:none;}
    .app{flex-direction:column; position:relative;}
    /* 地図を全面に */
    #map{position:absolute; inset:0; width:100%; height:100%;}
    .cell{font-size:12px;}
    /* カレンダー・一覧はボトムシート（下からスライド） */
    .side{
      position:absolute; left:0; right:0; bottom:0;
      width:100%; max-width:none; height:86vh;
      border:none; border-radius:16px 16px 0 0;
      box-shadow:0 -6px 24px rgba(0,0,0,.20);
      transform:translateY(calc(100% - 76px));
      transition:transform .28s cubic-bezier(.4,0,.2,1);
      z-index:1000; overscroll-behavior:contain;
    }
    body.sheet-open .side{transform:translateY(0);}
    .sheet-handle{
      display:flex; flex-direction:column; align-items:center; gap:5px;
      position:sticky; top:0; z-index:5; background:var(--panel);
      padding:9px 0 10px; cursor:grab; border-radius:16px 16px 0 0;
      border-bottom:1px solid var(--line);
      touch-action:none; user-select:none; -webkit-user-select:none;
    }
    .sheet-handle:active{cursor:grabbing;}
    body.sheet-dragging .side{transition:none !important;}
    .sheet-handle .grip{width:38px; height:5px; border-radius:99px; background:#d8cfc4;}
    .sheet-handle .sheet-hint{font-size:12px; color:var(--muted); font-weight:700;}
    body:not(.sheet-open) .sheet-handle .sheet-hint::before{content:"▴ ";}
    body.sheet-open .sheet-handle .sheet-hint::before{content:"▾ ";}
  }
  /* PC幅では、モバイルで付いた inline transform を必ず無効化（レイアウト崩れ防止） */
  @media (min-width:761px){ .side{transform:none !important;} }
</style>
</head>
<body>
<header>
  <span class="logo">🏮</span>
  <h1>お祭りマップ＆カレンダー</h1>
  <span class="sub">世田谷・杉並・目黒・大田・川崎</span>
</header>

<div class="app">
  <div id="map"></div>
  <div class="side">
    <div class="sheet-handle" id="sheetHandle">
      <span class="grip"></span>
      <span class="sheet-hint">カレンダー・一覧</span>
    </div>

    <div class="filters">
      <div class="search-wrap">
        <input id="search" class="search" type="search" placeholder="🔍 エリア・名前で検索（例: 奥沢、阿波おどり）" autocomplete="off">
        <button id="searchClear" class="search-clear" aria-label="検索クリア" hidden>✕</button>
      </div>
      <div class="chip-group">
        <span class="chip-label">エリア</span>
        <div class="chips" id="areaChips"></div>
      </div>
      <div class="chip-group">
        <span class="chip-label">種類</span>
        <div class="chips" id="chips"></div>
      </div>
    </div>

    <div class="cal">
      <div class="cal-head">
        <div class="mlabel" id="mlabel"></div>
        <div class="cal-nav">
          <button id="prev" aria-label="前の月">‹</button>
          <button class="today-btn" id="today">今日</button>
          <button id="next" aria-label="次の月">›</button>
        </div>
      </div>
      <div class="grid" id="dow"></div>
      <div class="grid" id="days"></div>
      <div class="cal-legend">
        <span><i style="background:var(--confirmed)"></i>日程確定</span>
        <span><i style="background:var(--annual)"></i>例年開催（要確認）</span>
      </div>
    </div>

    <div class="list">
      <div class="list-title" id="listTitle"></div>
      <div id="cards"></div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="festivals.js"></script>
<script>
(function(){
  "use strict";
  const F = window.FESTIVALS || [];
  const TODAY = new Date(2026, 6, 15); // 2026-07-15（アプリ基準日）
  const WD = ["日","月","火","水","木","金","土"];

  // ---- date helpers ----
  const ymd = d => d.toISOString().slice(0,10);
  const parse = s => { const [y,m,d]=s.split("-").map(Number); return new Date(y,m-1,d); };
  function inRange(dateStr, f){
    return f.dates.some(r => dateStr >= r.start && dateStr <= r.end);
  }
  // ---- filters ----
  // カテゴリをグループにまとめる（フィルタ用）
  const CAT_GROUPS = ["例大祭","盆踊り","夏祭り","阿波踊り","市・縁日"];
  function groupOf(cat){
    if(cat.indexOf("例大祭")>=0) return "例大祭";
    if(cat.indexOf("盆踊り")>=0) return "盆踊り";
    if(cat.indexOf("阿波")>=0)   return "阿波踊り";
    if(cat.indexOf("市")>=0 || cat.indexOf("縁日")>=0 || cat.indexOf("フリーマーケット")>=0) return "市・縁日";
    return "夏祭り";
  }
  // エリア（区/市）。area 未指定は世田谷区扱い。
  const AREAS = ["世田谷区","杉並区","目黒区","大田区","川崎市"];
  function areaOf(f){ return f.area || "世田谷区"; }

  const FILTER = { cats:new Set(), areas:new Set(), text:"" };
  function passesFilter(f){
    if(FILTER.areas.size && !FILTER.areas.has(areaOf(f))) return false;
    if(FILTER.cats.size && !FILTER.cats.has(groupOf(f.category))) return false;
    if(FILTER.text){
      const hay = (f.name+" "+f.place+" "+f.category+" "+areaOf(f)+" "+(f.desc||"")).toLowerCase();
      if(hay.indexOf(FILTER.text) < 0) return false;
    }
    return true;
  }

  // 指定日に開催中の祭り（フィルタ適用）
  function festsOn(dateStr){ return F.filter(f => passesFilter(f) && inRange(dateStr, f)); }
  // 指定月に1日でもかかる祭り（開始日順・フィルタ適用）
  function festsInMonth(y, m){ // m:0-based
    const first = `${y}-${String(m+1).padStart(2,"0")}-01`;
    const last  = `${y}-${String(m+1).padStart(2,"0")}-31`;
    return F.filter(f => passesFilter(f) && f.dates.some(r => r.start <= last && r.end >= first))
            .sort((a,b)=> firstDate(a).localeCompare(firstDate(b)));
  }
  function firstDate(f){ return f.dates.map(r=>r.start).sort()[0]; }
  function fmtRange(r){
    const s=parse(r.start), e=parse(r.end);
    const f=d=>`${d.getMonth()+1}/${d.getDate()}(${WD[d.getDay()]})`;
    return r.start===r.end ? f(s) : `${f(s)}〜${f(e)}`;
  }
  function whenLabel(f){ return f.dates.map(fmtRange).join("・"); }

  // ---- state ----
  let viewY = TODAY.getFullYear(), viewM = TODAY.getMonth();
  let selectedDate = null;   // "YYYY-MM-DD" or null
  let activeId = null;
  let showPast = false;      // 終了したお祭りをトグルで表示

  // 全ての開催日が今日より前に終わっていれば「過去」
  const TODAY_STR = ymd(TODAY);
  function isPast(f){ return f.dates.every(r => r.end < TODAY_STR); }
  function visibleByPast(f){ return showPast || !isPast(f); }

  // ---- map ----
  const map = L.map("map", {zoomControl:true}).setView([35.62, 139.68], 11);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom:19, attribution:'© OpenStreetMap'
  }).addTo(map);

  function pin(color){
    return L.divIcon({
      className:"", html:
      `<div style="width:26px;height:26px;transform:translate(-13px,-26px)">
        <svg viewBox="0 0 26 34" width="26" height="34">
          <path d="M13 0C5.8 0 0 5.8 0 13c0 9.7 13 21 13 21s13-11.3 13-21C26 5.8 20.2 0 13 0z" fill="${color}"/>
          <circle cx="13" cy="13" r="5.2" fill="#fff"/>
        </svg></div>`,
      iconSize:[26,34], iconAnchor:[13,34]
    });
  }
  const markers = {};
  F.forEach(f=>{
    const color = f.status==="confirmed" ? "var(--confirmed)" :  "#c8942f";
    const c = f.status==="confirmed" ? "#d84a1e" : "#c8942f";
    const mk = L.marker([f.lat,f.lng], {icon:pin(c)}).addTo(map);
    const badge = f.status==="confirmed" ? "確定" : "例年";
    const badgeColor = f.status==="confirmed" ? "#d84a1e" : "#c8942f";
    mk.bindPopup(
      `<div style="min-width:172px;max-width:230px">
         <div style="font-weight:700;font-size:14px;line-height:1.35;margin-bottom:4px">${f.name}
           <span style="font-size:10px;color:#fff;background:${badgeColor};border-radius:99px;padding:1px 7px;margin-left:2px;white-space:nowrap;vertical-align:middle">${badge}</span>
         </div>
         <div style="font-size:12.5px;color:#d84a1e;font-weight:600">📅 ${whenLabel(f)}</div>
         ${f.time?`<div style="font-size:11px;color:#6b625b;margin-top:3px">🕒 ${f.time}</div>`:""}
         <div style="font-size:11px;color:#6b625b;margin-top:2px">📍 ${areaOf(f)}・${f.place}</div>
         <div style="font-size:11px;margin-top:6px"><a href="${f.url}" target="_blank" rel="noopener" style="color:#e0592a;font-weight:600">詳細・最新情報を見る ↗</a></div>
       </div>`,
      {maxWidth:250, autoPanPadding:[24,24]}
    );
    mk.on("click", ()=>{ selectCard(f.id, false); });
    markers[f.id]=mk;
  });

  function updateMarkerVisibility(){
    const shownIds = new Set(currentList().map(f=>f.id));
    F.forEach(f=>{
      const mk=markers[f.id];
      if(shownIds.has(f.id)){ if(!map.hasLayer(mk)) mk.addTo(map); }
      else { if(map.hasLayer(mk)) map.removeLayer(mk); }
    });
  }

  // ---- current list (depends on selectedDate / month) ----
  // フィルタに合う祭りを年間から横断（開始日順）
  function festsAll(){
    return F.filter(passesFilter).sort((a,b)=> firstDate(a).localeCompare(firstDate(b)));
  }
  // 現在ビューの対象（過去フィルタ前）
  function currentBase(){
    if(FILTER.text) return festsAll();            // 検索時は月に関係なく年間から探す
    return selectedDate ? festsOn(selectedDate) : festsInMonth(viewY, viewM);
  }
  // 地図ピン・fitBounds 用（過去フィルタ適用）
  function currentList(){ return currentBase().filter(visibleByPast); }

  // ---- calendar render ----
  const dowEl=document.getElementById("dow");
  WD.forEach((w,i)=>{
    const d=document.createElement("div");
    d.className="dow"+(i===0?" sun":i===6?" sat":"");
    d.textContent=w; dowEl.appendChild(d);
  });

  function renderCal(){
    document.getElementById("mlabel").textContent = `${viewY}年 ${viewM+1}月`;
    const days=document.getElementById("days");
    days.innerHTML="";
    const first=new Date(viewY,viewM,1);
    const startPad=first.getDay();
    const dim=new Date(viewY,viewM+1,0).getDate();
    const todayStr=ymd(TODAY);

    for(let i=0;i<startPad;i++){
      const e=document.createElement("div"); e.className="cell empty"; days.appendChild(e);
    }
    for(let d=1; d<=dim; d++){
      const dateStr=`${viewY}-${String(viewM+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
      const dow=new Date(viewY,viewM,d).getDay();
      const fs=festsOn(dateStr).filter(visibleByPast);
      const cell=document.createElement("div");
      cell.className="cell"+(dow===0?" sun":dow===6?" sat":"")+(fs.length?" has":"");
      if(dateStr===todayStr) cell.classList.add("today");
      if(dateStr===selectedDate) cell.classList.add("selected");
      cell.innerHTML=`<span>${d}</span>`;
      if(fs.length){
        const dots=document.createElement("div"); dots.className="dots";
        const kinds=[...new Set(fs.map(f=>f.status))];
        kinds.slice(0,3).forEach(k=>{
          const dot=document.createElement("span"); dot.className="dot "+k; dots.appendChild(dot);
        });
        cell.appendChild(dots);
        cell.onclick=()=>{
          selectedDate = (selectedDate===dateStr)? null : dateStr;
          activeId=null; renderAll(); fitToList();
        };
      }
      days.appendChild(cell);
    }
  }

  // ---- list render ----
  function makeCard(f, isPastFlag){
    const card=document.createElement("div");
    card.className="card"+(f.id===activeId?" active":"")+(isPastFlag?" past":"");
    card.dataset.id=f.id;
    card.innerHTML=`
      <div class="row1">
        <span class="cname">${f.name}</span>
        <span class="badge ${f.status}">${f.status==="confirmed"?"確定":"例年"}</span>
        <span class="area-tag">${areaOf(f)}</span>
      </div>
      <div class="when">📅 ${whenLabel(f)}${f.time?" ／ "+f.time:""}</div>
      <div class="place">📍 ${f.place}</div>
      <div class="desc">${f.desc}</div>
      <div class="more"><a href="${f.url}" target="_blank" rel="noopener">詳細・最新情報を見る ↗</a></div>`;
    card.onclick=(e)=>{ if(e.target.tagName!=="A") selectCard(f.id, true); };
    return card;
  }

  function renderList(){
    const cards=document.getElementById("cards");
    const title=document.getElementById("listTitle");
    const base=currentBase();
    const upcoming=base.filter(f=>!isPast(f));
    const past=base.filter(f=>isPast(f));

    if(FILTER.text){
      title.innerHTML=`🔍「${searchEl.value}」の検索結果（${upcoming.length}件） <span class="clear" id="clearSel">✕ 解除</span>`;
    }else if(selectedDate){
      const d=parse(selectedDate);
      title.innerHTML=`${d.getMonth()+1}月${d.getDate()}日(${WD[d.getDay()]})のお祭り <span class="clear" id="clearSel">✕ 選択解除</span>`;
    }else{
      title.innerHTML=`${viewM+1}月のお祭り（${upcoming.length}件）`;
    }

    cards.innerHTML="";
    if(!upcoming.length && !past.length){
      const filtered = FILTER.cats.size || FILTER.text;
      cards.innerHTML=`<div class="empty-msg">${filtered?"絞り込み条件に合うお祭りが見つかりません。":"この"+(selectedDate?"日":"月")+"に登録されたお祭りはありません。"}</div>`;
    }else{
      upcoming.forEach(f=> cards.appendChild(makeCard(f,false)));
      if(!upcoming.length){
        const note=document.createElement("div");
        note.className="empty-msg"; note.style.padding="10px 4px";
        note.textContent="今後のお祭りはありません。";
        cards.appendChild(note);
      }
      if(past.length){
        const toggle=document.createElement("button");
        toggle.className="past-toggle";
        toggle.textContent = (showPast?"▾ 終了したお祭りを隠す（":"▸ 終了したお祭りを表示（")+past.length+"件）";
        toggle.onclick=()=>{ showPast=!showPast; activeId=null; renderAll(); fitToList(); };
        cards.appendChild(toggle);
        if(showPast) past.forEach(f=> cards.appendChild(makeCard(f,true)));
      }
    }

    const clr=document.getElementById("clearSel");
    if(clr) clr.onclick=(e)=>{ e.stopPropagation();
      if(FILTER.text){ searchEl.value=""; FILTER.text=""; searchClear.hidden=true; }
      else { selectedDate=null; }
      activeId=null; renderAll(); fitToList();
    };
  }

  function selectCard(id, pan){
    activeId = (activeId===id)? null : id;
    renderList(); updateMarkerVisibility();
    const f=F.find(x=>x.id===id);
    if(activeId && f){
      if(pan) map.setView([f.lat,f.lng], 15, {animate:true});
      markers[f.id] && markers[f.id].openPopup && null;
      // scroll card into view
      const el=document.querySelector('#cards .card[data-id="'+id+'"]');
      if(el) el.scrollIntoView({behavior:"smooth", block:"nearest"});
    }
    // re-mark selected on markers via re-render not needed
    renderCal();
  }

  function fitToList(){
    const list=currentList();
    if(!list.length) return;
    const b=L.latLngBounds(list.map(f=>[f.lat,f.lng]));
    map.fitBounds(b.pad(0.35), {maxZoom:15, animate:true});
  }

  // ---- filter chips ----
  function renderAreaChips(){
    const chips=document.getElementById("areaChips");
    chips.innerHTML="";
    AREAS.forEach(a=>{
      const n = F.filter(f=>areaOf(f)===a).length;
      if(!n) return;
      const chip=document.createElement("div");
      chip.className="chip"+(FILTER.areas.has(a)?" on":"");
      chip.textContent=a;
      chip.onclick=()=>{
        if(FILTER.areas.has(a)) FILTER.areas.delete(a); else FILTER.areas.add(a);
        activeId=null; renderAll(); fitToList();
      };
      chips.appendChild(chip);
    });
  }
  function renderChips(){
    const chips=document.getElementById("chips");
    chips.innerHTML="";
    CAT_GROUPS.forEach(g=>{
      const n = F.filter(f=>groupOf(f.category)===g).length;
      if(!n) return;
      const chip=document.createElement("div");
      chip.className="chip"+(FILTER.cats.has(g)?" on":"");
      chip.textContent=g;
      chip.onclick=()=>{
        if(FILTER.cats.has(g)) FILTER.cats.delete(g); else FILTER.cats.add(g);
        activeId=null; renderAll(); fitToList();
      };
      chips.appendChild(chip);
    });
  }

  function renderAll(){ renderAreaChips(); renderChips(); renderCal(); renderList(); updateMarkerVisibility(); }

  // ---- controls ----
  const searchEl=document.getElementById("search");
  const searchClear=document.getElementById("searchClear");
  searchEl.addEventListener("input", ()=>{
    FILTER.text=searchEl.value.trim().toLowerCase();
    searchClear.hidden = !searchEl.value;
    activeId=null; renderAll(); fitToList();
  });
  searchClear.onclick=()=>{ searchEl.value=""; FILTER.text=""; searchClear.hidden=true; activeId=null; renderAll(); fitToList(); };

  document.getElementById("prev").onclick=()=>{ viewM--; if(viewM<0){viewM=11;viewY--;} selectedDate=null; activeId=null; renderAll(); fitToList(); };
  document.getElementById("next").onclick=()=>{ viewM++; if(viewM>11){viewM=0;viewY++;} selectedDate=null; activeId=null; renderAll(); fitToList(); };
  document.getElementById("today").onclick=()=>{ viewY=TODAY.getFullYear(); viewM=TODAY.getMonth(); selectedDate=ymd(TODAY); activeId=null; renderAll(); fitToList(); };

  // ---- bottom sheet (mobile): タップ開閉＋ドラッグでリサイズ ----
  const sheetHandle=document.getElementById("sheetHandle");
  const sheet=document.querySelector(".side");
  const COLLAPSED_VIS=76;                // しまった時に見える高さ(px)
  function isMobile(){ return window.matchMedia("(max-width:760px)").matches; }
  // スナップ位置（translateYのpxオフセット）: [全開, 半分, 収納]
  function snaps(){
    const sheetH=sheet.offsetHeight;
    const halfVis=Math.round(window.innerHeight*0.5);
    return { sheetH, full:0, half:Math.max(0, sheetH-halfVis), collapsed:sheetH-COLLAPSED_VIS };
  }
  let curOffset=null;                    // 現在のtranslateY(px)
  function setSheet(offset, animate){
    const s=snaps();
    curOffset=Math.max(0, Math.min(s.collapsed, offset));
    sheet.style.transition = animate ? "" : "none";
    sheet.style.transform = "translateY("+curOffset+"px)";
    document.body.classList.toggle("sheet-open", curOffset < s.collapsed-4);
  }
  function snapNearest(offset){
    const s=snaps();
    let best=s.collapsed, bd=Infinity;
    [s.full, s.half, s.collapsed].forEach(o=>{ const d=Math.abs(o-offset); if(d<bd){bd=d;best=o;} });
    setSheet(best, true);
  }

  const TAP_MAX=12;                        // これ未満の移動はタップ扱い（指ブレを吸収）
  let dragging=false, startY=0, lastY=0, startOffset=0;
  function toggleSheet(){
    const s=snaps();
    const isCollapsed = (curOffset==null) || curOffset > s.collapsed-4;
    setSheet(isCollapsed ? s.half : s.collapsed, true);   // 収納⇄半開き
  }
  if(sheetHandle){
    sheetHandle.addEventListener("pointerdown", e=>{
      if(!isMobile()) return;
      dragging=true; startY=e.clientY; lastY=e.clientY;
      startOffset = (curOffset==null) ? snaps().collapsed : curOffset;
      document.body.classList.add("sheet-dragging");
      try{ sheetHandle.setPointerCapture(e.pointerId); }catch(_){}
    });
    sheetHandle.addEventListener("pointermove", e=>{
      if(!dragging) return;
      lastY=e.clientY;
      setSheet(startOffset + (e.clientY-startY), false);
      e.preventDefault();
    }, {passive:false});
    function endDrag(e){
      if(!dragging) return;
      dragging=false;
      document.body.classList.remove("sheet-dragging");
      try{ sheetHandle.releasePointerCapture(e.pointerId); }catch(_){}
      void sheet.offsetHeight;   // reflow: 今のドラッグ位置をトランジションの起点に確定
      if(Math.abs(lastY-startY) < TAP_MAX) toggleSheet();  // タップ：開閉
      else snapNearest(curOffset);                          // ドラッグ：最寄りにスナップ
    }
    sheetHandle.addEventListener("pointerup", endDrag);
    sheetHandle.addEventListener("pointercancel", endDrag);
  }
  // 画面幅の変化に追従（PCではinline transformを解除）
  function syncSheetForViewport(){
    if(isMobile()){
      const s=snaps();
      setSheet(curOffset==null ? s.collapsed : Math.min(curOffset, s.collapsed), false);
    }else{
      sheet.style.transform=""; sheet.style.transition=""; curOffset=null;
      document.body.classList.remove("sheet-open");
    }
    map.invalidateSize();
  }
  window.addEventListener("resize", syncSheetForViewport);

  // ---- init ----
  renderAll();
  fitToList();
  syncSheetForViewport();
  setTimeout(()=>map.invalidateSize(), 120);
})();
</script>
</body>
</html>
